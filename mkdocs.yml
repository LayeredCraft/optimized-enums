site_name: LayeredCraft.OptimizedEnums
site_description: High-performance, AOT-safe alternative to SmartEnum patterns using source generation
site_url: https://layeredcraft.github.io/optimized-enums/
site_author: Nick Cipollina

# Repository
repo_name: layeredcraft/optimized-enums
repo_url: https://github.com/layeredcraft/optimized-enums
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2025 LayeredCraft

# Configuration
theme:
  name: material
  language: en
  logo: assets/icon.png
  favicon: assets/icon.png

  features:
    - content.code.copy
    - content.code.select
    - navigation.expand
    - navigation.footer
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  # Dark/Light mode toggle
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
  - search
  - minify:
      minify_html: true

# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

  # Python Markdown Extensions
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Core Concepts:
    - How It Works: core-concepts/how-it-works.md
    - Source Generators: core-concepts/source-generators.md
    - Inheritance Model: core-concepts/inheritance-model.md
  - Usage:
    - Defining Enums: usage/defining-enums.md
    - Lookups & Queries: usage/lookups.md
    - String Values: usage/string-values.md
    - JSON Serialization: usage/json-serialization.md
  - Advanced:
    - Performance: advanced/performance.md
    - Diagnostics: advanced/diagnostics.md
    - AOT & Trimming: advanced/aot-trimming.md
  - API Reference:
    - Base Class: api-reference/base-class.md
    - Generated Members: api-reference/generated-members.md
  - Contributing: contributing.md
  - Changelog: changelog.md

# Social links
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/layeredcraft/optimized-enums
      name: GitHub Repository
    - icon: fontawesome/solid/download
      link: https://www.nuget.org/packages/LayeredCraft.OptimizedEnums/
      name: NuGet Package

# Custom CSS
extra_css:
  - assets/css/extra.css
