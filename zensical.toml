[project]
site_name = "LayeredCraft.OptimizedEnums"
site_description = "High-performance, AOT-safe alternative to SmartEnum patterns using source generation"
site_author = "Nick Cipollina"
site_url = "https://layeredcraft.github.io/optimized-enums/"
repo_name = "layeredcraft/optimized-enums"
repo_url = "https://github.com/layeredcraft/optimized-enums"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2025 LayeredCraft"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quick Start" = "getting-started/quick-start.md" }
  ] },
  { "Core Concepts" = [
    { "How It Works" = "core-concepts/how-it-works.md" },
    { "Source Generators" = "core-concepts/source-generators.md" },
    { "Inheritance Model" = "core-concepts/inheritance-model.md" }
  ] },
  { "Usage" = [
    { "Defining Enums" = "usage/defining-enums.md" },
    { "Lookups & Queries" = "usage/lookups.md" },
    { "String Values" = "usage/string-values.md" },
    { "JSON Serialization" = "usage/json-serialization.md" }
  ] },
  { "Advanced" = [
    { "Performance" = "advanced/performance.md" },
    { "Diagnostics" = "advanced/diagnostics.md" },
    { "AOT & Trimming" = "advanced/aot-trimming.md" }
  ] },
  { "API Reference" = [
    { "Base Class" = "api-reference/base-class.md" },
    { "Generated Members" = "api-reference/generated-members.md" }
  ] },
  { "Contributing" = "contributing.md" },
  { "Changelog" = "changelog.md" }
]

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.theme]
logo = "assets/icon.png"
favicon = "assets/icon.png"
language = "en"
features = [
  "content.code.copy",
  "content.code.select",
  "navigation.expand",
  "navigation.footer",
  "navigation.instant",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.extra]
homepage = "https://github.com/layeredcraft/optimized-enums"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/layeredcraft/optimized-enums"
name = "GitHub Repository"

[[project.extra.social]]
icon = "fontawesome/solid/download"
link = "https://www.nuget.org/packages/LayeredCraft.OptimizedEnums/"
name = "NuGet Package"